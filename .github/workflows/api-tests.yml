name: Newman API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Klonovani repozitare
      - uses: actions/checkout@v3

      # 2. Instalace Node.js
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Instalace Newmana, HTML reporteru a json-serveru
      - name: Install dependencies
        run: |
          npm install -g newman newman-reporter-htmlextra json-server

      # 4. Spusteni testu proti lokalnimu mock serveru
      # Server cte data primo ze souboru, ktere mas v repozitari
      - name: Run API Tests
        run: |
          # Spusteni json-serveru nad vsemi daty najednou
          # Poznamka: json-server umi cist vice souboru, pokud je spojis v db.json
          json-server --watch db.json --routes routes.json --port 3000 > server.log 2>&1 &
          
          # Cekani na inicializaci serveru
          sleep 10
          
          # Automaticka zamena URL v kolekci na localhost
          sed -i 's|https://fakestoreapi.com|http://localhost:3000|g' ecommerce-api-collection.postman_collection.json
          
          # Spusteni testu
          newman run ecommerce-api-collection.postman_collection.json \
          -e ecommerce-environment.postman_environment.json \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export report.html

      # 5. Archivace HTML reportu
      # Ulozi vysledek testu pro kontrolu
      - name: Archive HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: API-Test-Report
          path: report.html