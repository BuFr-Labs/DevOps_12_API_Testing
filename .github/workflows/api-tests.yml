name: Newman API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # checkout repozitare s kolekci a environmentem
      - uses: actions/checkout@v3

      # spusteni Newman testu v Docker kontejneru
      # pouziva official postman/newman image
      # tim se eliminuje problem s Node/OpenSSL/TLS na runneru
      - name: Run Newman tests (Docker)
        run: |
          docker run --rm \
            -e NODE_TLS_REJECT_UNAUTHORIZED=0 \
            -v $PWD:/etc/newman \
            postman/newman:alpine \
            run ecommerce-api-collection.postman_collection.json \
            -e ecommerce-environment.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export report.html

      # upload HTML reportu jako artefakt do GitHub Actions
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: report.html