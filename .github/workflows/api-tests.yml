name: Newman API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      # 1. Klonovani repozitare
      - uses: actions/checkout@v3

      # 2. Instalace Node.js
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      # 3. Instalace Newmana a json-serveru
      - name: Install dependencies
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g json-server

      # 4. Spusteni testu proti lokalnimu mock serveru
      - name: Run API Tests
        run: |
          # Spust mock server na pozadi
          json-server --watch db.json --port 3000 &
          # Cekej 5 sekund, nez server nastartuje
          sleep 5
          # Spust testy proti localhostu
          newman run ecommerce-api-collection.postman_collection.json \
          -e ecommerce-environment.postman_environment.json \
          --global-var "baseUrl=http://localhost:3000" \
          --reporters cli,htmlextra \
          --reporter-htmlextra-export report.html

      # 5. Archivace HTML reportu
      - name: Archive HTML Report
        uses: actions/upload-artifact@v4
        with:
          name: API-Test-Report
          path: report.html