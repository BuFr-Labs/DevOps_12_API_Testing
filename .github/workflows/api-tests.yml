name: Newman API Tests

on: [push]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # stahni repozitar na runner
      - uses: actions/checkout@v3

      # nastav Node.js verzi 20, aby TLS fungovalo spravne
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # nainstaluj newman a htmlextra reporter pro hezky HTML report
      - name: Install Newman + htmlextra reporter
        run: npm install -g newman newman-reporter-htmlextra

      # spust testy - kolekce + environment jsou v repozitari
      - name: Run Newman tests
        run: |
          newman run ecommerce-api-collection.postman_collection.json \
            -e ecommerce-environment.postman_environment.json \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export report.html

      # uloz HTML report jako artefakt - ke stazeni v Actions
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: report.html